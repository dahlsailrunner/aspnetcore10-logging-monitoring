receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  transform/add-collector-enabled:
    error_mode: ignore
    log_statements:
      - set(resource.attributes["collector.enabled"], "true")
    trace_statements:
      - set(resource.attributes["collector.enabled"], "true")
    metric_statements:
      - set(resource.attributes["collector.enabled"], "true")

exporters:
  debug:
    verbosity: detailed
  otlp/aspire:
    endpoint: ${env:ASPIRE_ENDPOINT}
    headers:
      x-otlp-api-key: ${env:ASPIRE_API_KEY}
  azuremonitor:
    connection_string: ${env:APP_INSIGHTS_CONN}
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}
  otlphttp/elastic:
    endpoint: ${env:ELK_APM_ENDPOINT}
    headers:
      Authorization: "Bearer ${env:ELK_KEY}"

  
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [otlp/aspire, azuremonitor, datadog, otlphttp/elastic]
      #exporters: [datadog]
    metrics:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [otlp/aspire, azuremonitor, datadog, otlphttp/elastic]
      #exporters: [datadog]
    logs:
      receivers: [otlp]
      processors: [batch, transform/add-collector-enabled]
      exporters: [otlp/aspire, azuremonitor, datadog, otlphttp/elastic]
      #exporters: [datadog]